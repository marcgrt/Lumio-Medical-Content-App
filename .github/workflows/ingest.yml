name: Lumio Daily Ingestion

on:
  schedule:
    # 5:00 UTC = 7:00 MEZ (Winter) / 7:00 MESZ (Sommer)
    - cron: "0 5 * * *"
  workflow_dispatch:  # Manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download previous DB artifact
        uses: actions/download-artifact@v4
        with:
          name: lumio-db-latest
          path: db/
        continue-on-error: true  # First run won't have an artifact yet

      - name: Run ingestion pipeline
        run: python -m src 2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumio-db-latest
          path: db/lumio.db
          retention-days: 30
          overwrite: true

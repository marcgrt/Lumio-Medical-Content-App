name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile $(find src tests -name '*.py')

      - name: Basic import check
        run: |
          python -c "from src.models import Article; print('models OK')"
          python -c "from src.api import app; print('api OK')"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

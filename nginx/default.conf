# ---------- Lumio Nginx — Basic Auth + SSL + Reverse Proxy ----------

# Redirect HTTP → HTTPS (except ACME challenge)
server {
    listen 80;
    server_name _;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS with Basic Auth
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certs (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/lumio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumio/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Basic Auth
    auth_basic "Lumio — Zugang nur mit Passwort";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # API — token-auth (no Basic Auth), proxied to FastAPI
    location /api/ {
        auth_basic off;
        proxy_pass http://lumio:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }

    # Streamlit Reverse Proxy
    location / {
        proxy_pass http://lumio:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Streamlit)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeouts for Streamlit
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Streamlit health endpoint (no auth)
    location /_stcore/health {
        auth_basic off;
        proxy_pass http://lumio:8501/_stcore/health;
    }
}
